# Nginx site config for the FFG Recon app.
#
# Drop this file in /etc/nginx/sites-available/recon then symlink it:
#   sudo ln -s /etc/nginx/sites-available/recon /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Architecture:
#   - Frontend (Next.js) on localhost:3001 serves the UI.
#   - Backend (NestJS) on localhost:3000 serves the API.
#   - This Nginx server sits in front of both, gives you one domain.
#
# Routing:
#   /api/*  → backend  (we strip the /api prefix so /api/auth/login
#                       reaches the backend as /auth/login)
#   /*       → frontend
#
# After this works, run certbot to add HTTPS:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d recon.yourdomain.co.za
# certbot will rewrite this file with the SSL block automatically.

server {
  listen 80;
  server_name recon.yourdomain.co.za;   # ← change to your real hostname

  # Allow large invoice uploads.
  client_max_body_size 20M;

  # Backend API.
  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Frontend.
  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Next.js needs these for HMR / streaming SSR.
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
  }
}
